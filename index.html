  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"207cca0e-1fd2-40ce-a640-7313762a3952\"><\u002Fscript>\n\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  * { box-sizing: border-box; }\n  body { margin: 0; }\n<\u002Fstyle>\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Set up the problem.\",\n  \"Define the key term.\",\n  \"The story in three beats. AND: we built a new Power BI report that showed the full month's completed Lotted Online Sales. BUT it couldn't be viewed with a custom date range, so you couldn't see the lotted sales day by day or track progress through the month. THEREFORE we changed it to use a custom date range.\",\n  \"Trade-offs side by side.\",\n  \"What matches, what differs, by range type.\",\n  \"MOKAN numbers. MMG fixed at full month; PBI shrinks to range.\",\n  \"Same pattern, Tori Basile's District. Both ranges $2,352.89.\",\n  \"Real report, MOKAN. Two ranges, identical $19,074.28.\",\n  \"Land the three points.\"\n]\n<\u002Fscript>\n<\u002Fhelmet>\n\n<x-import component-from-global-scope=\"deck-stage\" from=\"b7c629cf-e5e7-4616-8159-1970b7fcec66#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n  <!-- 1. TITLE -->\n  <section data-label=\"Title\" data-speaker-notes=\"Set up the problem.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:120px 130px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column; justify-content:center;\">\n    <div style=\"font-size:24px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#c2613f; margin-bottom:34px;\">MERS Goodwill · Month-End Reporting<\u002Fdiv>\n    <h1 style=\"font-family:Georgia,serif; font-weight:700; font-size:104px; line-height:1.04; letter-spacing:-0.01em; margin:0 0 36px; max-width:20ch;\">Why your lotted online sales numbers look different between two different reports<\u002Fh1>\n    <p style=\"font-size:36px; line-height:1.5; color:#5f574c; margin:0; max-width:46ch;\">The new Power BI report can show different lotted online sales than the old MMG report for some date ranges. Actual Sales and Explicit Online Sales are always correct — only how lotted online sales get shared between stores has changed.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 2. WHAT ARE ALLOCATED ONLINE SALES -->\n  <section data-label=\"The concept\" data-speaker-notes=\"Define the key term.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:110px 130px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column; justify-content:center;\">\n    <div style=\"font-size:22px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#2f7196; margin-bottom:28px;\">First — the key idea<\u002Fdiv>\n    <h2 style=\"font-family:Georgia,serif; font-weight:700; font-size:80px; line-height:1.08; margin:0 0 44px; max-width:24ch;\">What are \"Lotted Online Sales\"?<\u002Fh2>\n    <div style=\"border-left:6px solid #2f7196; padding-left:40px;\">\n      <p style=\"font-size:42px; line-height:1.5; color:#3f3933; margin:0; max-width:40ch;\">Online sales aren't tied to any one store. So we spread that revenue across stores based on each store's <strong>share of the quantities sold<\u002Fstrong>.<\u002Fp>\n      <p style=\"font-size:42px; line-height:1.5; color:#3f3933; margin:36px 0 0; max-width:40ch;\">How we measure that share has changed <strong style=\"color:#c2613f;\">twice<\u002Fstrong> — and that one detail explains every difference you're seeing.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2b. HOW EACH STORE AFFECTS ALLOCATION -->\n  \n\n  <!-- 3. HOW WE GOT HERE (AND / BUT / THEREFORE) -->\n  <section data-label=\"How we got here\" data-speaker-notes=\"The story in three beats. AND: we built a new Power BI report that showed the full month's completed Lotted Online Sales. BUT it couldn't be viewed with a custom date range, so you couldn't see the lotted sales day by day or track progress through the month. THEREFORE we changed it to use a custom date range.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:90px 110px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column;\">\n    <h2 style=\"font-family:Georgia,serif; font-weight:700; font-size:64px; margin:0 0 12px;\">How we got here<\u002Fh2>\n    <p style=\"font-size:28px; color:#5f574c; margin:0 0 48px;\">The whole change, in three beats.<\u002Fp>\n    <div style=\"display:flex; gap:32px; flex:1;\">\n\n      <div style=\"flex:1; background:#fff; border:1px solid #ece4d8; border-radius:20px; overflow:hidden; display:flex; flex-direction:column;\">\n        <div style=\"height:8px; background:#b6ada0;\"><\u002Fdiv>\n        <div style=\"padding:42px 44px; display:flex; flex-direction:column; height:100%;\">\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:46px; color:#857c6e; margin-bottom:24px;\">And<\u002Fdiv>\n          <p style=\"font-size:31px; line-height:1.45; color:#3f3933; margin:0;\">We built a new Power BI report that showed the <strong>full month's<\u002Fstrong> completed <strong>Lotted Online Sales<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; background:#fff; border:1px solid #f0d8cf; border-radius:20px; overflow:hidden; display:flex; flex-direction:column;\">\n        <div style=\"height:8px; background:#c2613f;\"><\u002Fdiv>\n        <div style=\"padding:42px 44px; display:flex; flex-direction:column; height:100%;\">\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:46px; color:#c2613f; margin-bottom:24px;\">But<\u002Fdiv>\n          <p style=\"font-size:31px; line-height:1.45; color:#3f3933; margin:0;\">It couldn't be viewed with a <strong>custom date range<\u002Fstrong> — so you couldn't see lotted sales <strong>day by day<\u002Fstrong> or track progress through the month.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; background:#fff; border:2px solid #2f7196; border-radius:20px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 12px 36px rgba(47,113,150,0.16);\">\n        <div style=\"height:8px; background:#2f7196;\"><\u002Fdiv>\n        <div style=\"padding:42px 44px; display:flex; flex-direction:column; height:100%;\">\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:46px; color:#2f7196; margin-bottom:24px;\">Therefore<\u002Fdiv>\n          <p style=\"font-size:31px; line-height:1.45; color:#3f3933; margin:0;\">We changed it to use a <strong>custom date range<\u002Fstrong> — so you can see any span of days and watch the month build.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4. PRO/CON MATRIX -->\n  <section data-label=\"Pro / Con matrix\" data-speaker-notes=\"Trade-offs side by side.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:88px 110px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column;\">\n    <h2 style=\"font-family:Georgia,serif; font-weight:700; font-size:64px; margin:0 0 40px;\">Pro / Con matrix<\u002Fh2>\n    <div style=\"display:flex; gap:28px; flex:1;\">\n      <div style=\"flex:1; background:#fff; border:1px solid #ece4d8; border-radius:18px; overflow:hidden; display:flex; flex-direction:column;\">\n        <div style=\"padding:26px 30px; background:#f6f2ea; border-bottom:1px solid #ece4d8;\">\n          <div style=\"font-size:18px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#857c6e; margin-bottom:6px;\">Phase 1 · Legacy<\u002Fdiv>\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:32px;\">Original MMG<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px; flex:1;\">\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#2f6b3a; margin-bottom:14px;\">Pros<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:28px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Familiar legacy report<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Matches full-month totals<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#b35435; margin-bottom:14px;\">Cons<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>Mismatched timeframes<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>One day shows whole month's online<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>Misleading for partial ranges<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 30px; background:#f6f2ea; border-top:1px solid #ece4d8; font-size:21px; line-height:1.4; color:#6b635a;\"><strong style=\"color:#2b2620;\">Bottom line:<\u002Fstrong> fine for whole months, shaky below that.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; background:#fff; border:1px solid #ece4d8; border-radius:18px; overflow:hidden; display:flex; flex-direction:column;\">\n        <div style=\"padding:26px 30px; background:#fbf3e3; border-bottom:1px solid #f0e3cb;\">\n          <div style=\"font-size:18px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#a06a1e; margin-bottom:6px;\">Phase 2<\u002Fdiv>\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:32px;\">Monthly Aggregation<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px; flex:1;\">\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#2f6b3a; margin-bottom:14px;\">Pros<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:28px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Consistent timeframes<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Clean, easy to explain<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Matches MMG for full months<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#b35435; margin-bottom:14px;\">Cons<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>Locked into monthly buckets<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>No custom daily ranges<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 30px; background:#fbf3e3; border-top:1px solid #f0e3cb; font-size:21px; line-height:1.4; color:#6b635a;\"><strong style=\"color:#2b2620;\">Bottom line:<\u002Fstrong> consistent, but not flexible.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1; background:#fff; border:2px solid #2f7196; border-radius:18px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 12px 36px rgba(47,113,150,0.16);\">\n        <div style=\"padding:26px 30px; background:#e7f0f5; border-bottom:1px solid #cfe3ec;\">\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:6px;\">\n            <span style=\"font-size:18px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#2f7196;\">Phase 3<\u002Fspan>\n            <span style=\"font-size:16px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#fff; background:#2f7196; border-radius:30px; padding:4px 12px;\">Current<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:Georgia,serif; font-weight:700; font-size:32px;\">Daily Aggregation<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:28px 30px; flex:1;\">\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#2f6b3a; margin-bottom:14px;\">Pros<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px; margin-bottom:28px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Any custom date range<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Truthful to the dates you pick<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#3a8a4a; font-weight:700;\">✓<\u002Fspan><span>Accurate for non-month ranges<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:#b35435; margin-bottom:14px;\">Cons<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"display:flex; gap:12px; font-size:24px; line-height:1.35; color:#4a4339;\"><span style=\"color:#c2613f; font-weight:700;\">✕<\u002Fspan><span>Online split won't match old report for partial months<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 30px; background:#e7f0f5; border-top:1px solid #cfe3ec; font-size:21px; line-height:1.4; color:#3d5a68;\"><strong style=\"color:#2b2620;\">Bottom line:<\u002Fstrong> flexible and accurate — the right trade-off.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5. OLD VS NEW -->\n  <section data-label=\"Old vs New\" data-speaker-notes=\"What matches, what differs, by range type.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:90px 110px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column;\">\n    <h2 style=\"font-family:Georgia,serif; font-weight:700; font-size:62px; margin:0 0 12px;\">Old MMG vs. new Power BI report<\u002Fh2>\n    <p style=\"font-size:28px; color:#5f574c; margin:0 0 40px;\">What's the same and what's different, by the kind of date range you select.<\u002Fp>\n    <div style=\"background:#fff; border:1px solid #ece4d8; border-radius:18px; overflow:hidden; flex:1;\">\n      <table style=\"width:100%; height:100%; border-collapse:collapse; font-size:26px;\">\n        <thead>\n          <tr style=\"background:#f6f2ea;\">\n            <th style=\"text-align:left; padding:24px 36px; font-size:21px; letter-spacing:0.05em; text-transform:uppercase; color:#857c6e; border-bottom:1px solid #ece4d8; width:26%;\">Date range<\u002Fth>\n            <th style=\"text-align:left; padding:24px 36px; font-size:21px; letter-spacing:0.05em; text-transform:uppercase; color:#857c6e; border-bottom:1px solid #ece4d8; width:36%;\">Columns<\u002Fth>\n            <th style=\"text-align:left; padding:24px 36px; font-size:21px; letter-spacing:0.05em; text-transform:uppercase; color:#857c6e; border-bottom:1px solid #ece4d8;\">Result<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top;\"><strong>Is a calendar month<\u002Fstrong><\u002Ftd>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top; color:#5f574c;\">All columns<\u002Ftd>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top;\"><span style=\"display:inline-flex; align-items:center; gap:10px; background:#eef6ee; color:#2f6b3a; font-weight:700; font-size:23px; padding:8px 18px; border-radius:30px;\">✓ Match 100%<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top;\" rowspan=\"3\"><strong>Is <em>not<\u002Fem> a calendar month<\u002Fstrong><div style=\"font-size:21px; color:#857c6e; margin-top:6px; font-weight:400;\">e.g. a custom range<\u002Fdiv><\u002Ftd>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top; color:#5f574c;\">Actual, Explicit Online Sales, Goal<\u002Ftd>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top;\"><span style=\"display:inline-flex; align-items:center; gap:10px; background:#eef6ee; color:#2f6b3a; font-weight:700; font-size:23px; padding:8px 18px; border-radius:30px;\">✓ Match 100%<\u002Fspan><\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top;\"><strong style=\"color:#c2613f;\">Lotted Online Sales<\u002Fstrong><\u002Ftd>\n            <td style=\"padding:26px 36px; border-bottom:1px solid #f1ece3; vertical-align:top; font-size:23px; color:#5f574c;\"><strong style=\"color:#857c6e;\">MMG:<\u002Fstrong> whole month of the start date · <strong style=\"color:#2f7196;\">PBI:<\u002Fstrong> exact selected range<\u002Ftd>\n          <\u002Ftr>\n          <tr>\n            <td style=\"padding:26px 36px; vertical-align:top;\"><strong>Total Sales<\u002Fstrong><\u002Ftd>\n            <td style=\"padding:26px 36px; vertical-align:top; color:#5f574c;\">Differs — entirely from the Lotted Online Sales above<\u002Ftd>\n          <\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6. WORKED EXAMPLES -->\n  <section data-label=\"Worked examples\" data-speaker-notes=\"MOKAN numbers. MMG fixed at full month; PBI shrinks to range.\" style=\"width:100%; height:100%; box-sizing:border-box; padding:88px 110px; background:#faf7f2; color:#2b2620; font-family:Arial,sans-serif; display:flex; flex-direction:column;\">\n    <h2 style=\"font-family:Georgia,serif; font-weight:700; font-size:62px; margin:0 0 12px;\">Worked examples — MOKAN division<\u002Fh2>\n    <p style=\"font-size:26px; color:#5f574c; margin:0 0 40px;\">Same division, three ranges. MMG always reports the full month <strong style=\"color:#2b2620;\">($19,074.28)<\u002Fstrong>; PBI reports only what's inside the range.<\u002Fp>\n    <div style=\"display:flex; flex-direction:column; gap:26px; flex:1;\">\n\n      <div style=\"background:#fff; border:1px solid #cfe3d0; border-radius:18px; padding:30px 38px;\">\n        <div style=\"display:flex; align-items:center; gap:18px; margin-bottom:20px;\">\n          <span style=\"font-family:Georg
